<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFT Preview Card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>
  <main class="container">

    <article class="card">

      <div class="card__img-container">
        <img src="https://github.com/Kking927/nft-card-component/blob/main/images/image-equilibrium.jpg?raw=true" alt="Equilibrium digital artwork cube" class="card__img">
      </div>

        <h1 class="card__title">Equilibrium #3429</h1>
        <p class="card__description">Our Equilibrium collection promotes balance and calm.</p>

      <div class="card__stats">
        <div class="card__stat-item">
          <img src="https://raw.githubusercontent.com/Kking927/nft-card-component/ed9d35bad440ceca4f3951633d67987caeaf7e4a/images/icon-ethereum.svg" alt="Ethereum icon" class="card__stat-icon card__stat-icon--price">
          <span class="card__stat-value--price">0.041 ETH</span>
        </div>

        <div class="card__stat-item">
          <img src="https://raw.githubusercontent.com/Kking927/nft-card-component/19c9696dbf4c3bc719763bd7d3a02e049d121301/images/icon-clock.svg" alt="Clock icon" class="card__stat-icon card__stat-icon--time">
          <time datetime="P3D" class="card__stat-value">3 days left</time>
        </div>
      </div>

      <hr class="card__divider">

      <div class="card__footer">
        <img src="https://github.com/Kking927/nft-card-component/blob/main/images/image-avatar.png?raw=true" alt="Portrait of Creation Share creator Jules Wyvern" class="card__avatar">
        <div class="card__author">
          Creation of <span class="card__author-name">Jules Wyvern</span>
        </div>
      </div>

    </article> </main>
</body>

</html>
